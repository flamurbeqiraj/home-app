<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffedf3" />
    <title>Gjej ngjyrën</title>
    <script>
      if (!location.pathname.endsWith("/") && !location.pathname.endsWith(".html")) {
        location.replace(`${location.pathname}/${location.search}${location.hash}`);
      }
    </script>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="game.css" />
    <script src="game.js" defer></script>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <a class="home-button" href="../../index.html" aria-label="Kthehu te të gjitha lojërat">‹</a>
        <div class="level-box">
          <span id="level-label">Niveli 1</span>
          <span id="round-label">1 / 3</span>
        </div>
        <div class="score-box" aria-label="Pikët e tanishme">⭐ <span id="score">0</span></div>
      </header>

      <section id="start-screen" class="panel start-screen">
        <div class="rainbow" aria-hidden="true">🎨</div>
        <h1>Gjej ngjyrën</h1>
        <p>Dëgjo ngjyrën, pastaj prek figurën me ngjyrën e duhur!</p>
        <button id="start-button" class="primary-button" type="button">Luaj!</button>
      </section>

      <section id="play-screen" class="play-screen hidden" aria-labelledby="instruction">
        <div class="timer-track" aria-label="Koha e mbetur">
          <div id="timer-bar" class="timer-bar"></div>
        </div>

        <div class="prompt-row">
          <h1 id="instruction">Cilën ngjyrë dëgjove?</h1>
          <button id="repeat-button" class="repeat-button" type="button" aria-label="Dëgjoje ngjyrën përsëri">🔊</button>
        </div>

        <div id="choices" class="choices" aria-label="Zgjedhjet e ngjyrave"></div>
        <p id="feedback" class="feedback" aria-live="assertive">Dëgjo me kujdes!</p>
      </section>

      <section id="end-screen" class="panel end-screen hidden" aria-live="polite">
        <div id="result-picture" class="result-picture" aria-hidden="true"></div>
        <h1 id="result-title"></h1>
        <p id="result-score"></p>
        <button id="restart-button" class="primary-button" type="button"></button>
        <a class="dashboard-link" href="../../index.html">Kthehu te lojërat</a>
      </section>

      <div id="confetti" class="confetti" aria-hidden="true"></div>
    </main>
  </body>
</html>
