<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#dff6ff" />
    <title>Ku të shkojmë?</title>
    <script>
      if (!location.pathname.endsWith("/") && !location.pathname.endsWith(".html")) {
        location.replace(location.pathname + "/" + location.search + location.hash);
      }
    </script>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="game.css" />
    <script src="game.js" defer></script>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <a class="home-button" href="../../index.html" aria-label="Kthehu te të gjitha lojërat">‹</a>
        <div class="level-box"><span id="level-label">Niveli 1</span><span id="round-label">1 / 3</span></div>
        <div class="score-box" aria-label="Pikët e tanishme">⭐ <span id="score">0</span></div>
      </header>
      <section id="start-screen" class="panel start-screen">
        <div class="start-scene" aria-hidden="true"><span>🌳</span><span class="start-car">🚙</span><span>🏠</span></div>
        <h1>Ku të shkojmë?</h1>
        <p>Dëgjo drejtimin dhe ndihmo makinën të gjejë rrugën!</p>
        <div class="word-preview" aria-hidden="true">← Majtas · Përpara ↑<br />→ Djathtas · Prapa ↓</div>
        <button id="start-button" class="primary-button" type="button">Nisu!</button>
      </section>
      <section id="play-screen" class="play-screen hidden" aria-labelledby="instruction">
        <div class="timer-track" aria-label="Koha e mbetur"><div id="timer-bar" class="timer-bar"></div></div>
        <div class="prompt-row">
          <h1 id="instruction">Dëgjo drejtimin!</h1>
          <button id="repeat-button" class="repeat-button" type="button" aria-label="Dëgjo drejtimin përsëri">🔊</button>
        </div>
        <div id="road" class="road" aria-label="Kryqëzim me katër drejtime">
          <div class="road-line vertical"></div><div class="road-line horizontal"></div>
          <span id="destination" class="destination" aria-hidden="true"></span>
          <span id="car" class="car" aria-hidden="true">🚙</span>
          <div id="controls" class="controls">
            <button class="direction forward" data-direction="forward" type="button" aria-label="Përpara"><span class="arrow">↑</span><span class="direction-label">Përpara</span></button>
            <button class="direction left" data-direction="left" type="button" aria-label="Majtas"><span class="arrow">←</span><span class="direction-label">Majtas</span></button>
            <button class="direction right" data-direction="right" type="button" aria-label="Djathtas"><span class="arrow">→</span><span class="direction-label">Djathtas</span></button>
            <button class="direction backward" data-direction="backward" type="button" aria-label="Prapa"><span class="arrow">↓</span><span class="direction-label">Prapa</span></button>
          </div>
        </div>
        <p id="feedback" class="feedback" aria-live="assertive">Dëgjo me kujdes!</p>
      </section>
      <section id="end-screen" class="panel end-screen hidden" aria-live="polite">
        <div id="result-picture" class="result-picture" aria-hidden="true"></div>
        <h1 id="result-title"></h1><p id="result-score"></p>
        <button id="restart-button" class="primary-button" type="button"></button>
        <a class="dashboard-link" href="../../index.html">Kthehu te lojërat</a>
      </section>
      <div id="confetti" class="confetti" aria-hidden="true"></div>
      <audio id="direction-audio" preload="auto" playsinline></audio>
    </main>
  </body>
</html>
